<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="google" content="notranslate, nositelinkssearchbox">
  <meta name="format-detection" content="telephone=no, date=no, address=no">
  <title>E1 Material</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ════════ HEADER ════════ -->
<div class="header" id="header">
  <div class="header-text" id="header-title">
    <span class="header-main">E1 Material <span id="header-version"></span></span>
  </div>
  <button class="btn-help" id="btn-help" onclick="location.href='hilfe/index.html'" title="Hilfe / Anleitung">&#9432;</button>
</div>

<!-- ════════ VIEW: Katalog ════════ -->
<div class="screen active" id="view-katalog" data-view="katalog">
  <p class="hint">Materialkatalog — wird in Block B befuellt.</p>
</div>

<!-- ════════ VIEW: Korb ════════ -->
<div class="screen" id="view-korb" data-view="korb">
  <p class="hint">Nachbestell-Korb — wird in Block C/D befuellt.</p>
</div>

<!-- ════════ VIEW: Einstellungen ════════ -->
<div class="screen" id="view-einstellungen" data-view="einstellungen">
  <p class="hint">Einstellungen — wird in Block D befuellt.</p>
</div>

<!-- ════════ NAVIGATION (Tab-Leiste) ════════ -->
<nav class="tab-nav" id="tab-nav">
  <button class="tab-nav-btn active" data-view="katalog" onclick="App.showView('katalog')">
    <span class="tab-nav-label">Katalog</span>
  </button>
  <button class="tab-nav-btn" data-view="korb" onclick="App.showView('korb')">
    <span class="tab-nav-label">Korb</span>
    <span class="count-badge" id="korb-badge" style="display:none">0</span>
  </button>
  <button class="tab-nav-btn" data-view="einstellungen" onclick="App.showView('einstellungen')">
    <span class="tab-nav-label">Einstellungen</span>
  </button>
</nav>

<!-- ════════ Toast ════════ -->
<div class="toast" id="toast"></div>

<!-- ════════ Scripts ════════ -->
<script src="lib/xlsx.mini.min.js"></script>
<script src="js/db.js"></script>
<script src="js/catalog.js"></script>
<script src="js/basket.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
